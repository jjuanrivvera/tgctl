# .github/workflows/ci.yml — copied into a generated CLI by cliwright (GOAL.md §6).
# Key trap: use the prebuilt gosec ACTION, not `go install` of a pinned old scanner
# (an old gosec/govulncheck won't compile under a newer Go toolchain).
name: CI
on:
  push: { branches: [main, develop] }
  pull_request:

permissions: { contents: read }

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        # Pin to a golangci-lint built with Go >= the module's go directive (1.25); the action's
        # default is built with an older Go and refuses to analyze a go1.25 module.
        with: { version: latest }
      - name: docs-gen drift check
        run: make docs-gen && git diff --exit-code -- docs/commands

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec (high-severity gate, prebuilt action)
        uses: securego/gosec@v2.21.4
        with: { args: '-severity high -confidence medium ./...' }

  test:
    strategy:
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: go test -race ./... -coverprofile=coverage.out
      - name: coverage gate (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/cover-check.sh 80
      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: check }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: release --snapshot --clean --skip=sign,sbom,docker }
