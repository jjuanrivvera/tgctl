# .github/workflows/ci.yml — copied into a generated CLI by cliwright (GOAL.md §6).
# Key trap: use the prebuilt gosec ACTION, not `go install` of a pinned old scanner
# (an old gosec/govulncheck won't compile under a newer Go toolchain).
name: CI
on:
  push: { branches: [main, develop] }
  pull_request:

permissions: { contents: read }

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        # goinstall builds golangci-lint with THIS job's Go (1.25). The prebuilt release
        # binaries lag and are still built with Go 1.24, which refuses to analyze a go1.25
        # module ("build Go < targeted Go"). Compiling it here sidesteps that entirely.
        with: { version: latest, install-mode: goinstall }
      - name: docs-gen drift check
        run: make docs-gen && git diff --exit-code -- docs/commands

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec (high-severity gate)
        # Built from source with this job's Go (1.25) for the same reason as golangci-lint:
        # the pinned prebuilt action lagged the Go toolchain and could no longer parse the
        # go1.25 module. @latest compiled here always matches the module's Go.
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity high -confidence medium ./...

  test:
    strategy:
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: go test -race ./... -coverprofile=coverage.out
      - name: coverage gate (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/cover-check.sh 80
      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # tags, so goreleaser derives a version (not 0.0.0-SNAPSHOT)
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      # syft must be on PATH for the SBOM step; provide it so the snapshot can't fail on it.
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with: { args: check }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: release --snapshot --clean --skip=sign,docker }
