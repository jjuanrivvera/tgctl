# .goreleaser.yaml — copied into a generated CLI by cliwright (GOAL.md §5).
# Replace tgctl / jjuanrivvera / tgctl. Run `goreleaser check` in CI (not only at tag).
version: 2

before:
  hooks: [go mod tidy, ./scripts/completions.sh]

builds:
  - id: tgctl
    main: ./cmd/tgctl
    binary: tgctl
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - { goos: windows, goarch: arm64 }
    ldflags:
      - -s -w
      - -X {{ .ModulePath }}/internal/version.Version={{ .Version }}
      - -X {{ .ModulePath }}/internal/version.Commit={{ .Commit }}
      - -X {{ .ModulePath }}/internal/version.Date={{ .Date }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - { goos: windows, formats: [zip] }
    files: [README.md, LICENSE, completions/*]

checksum: { name_template: checksums.txt }

# An explicit release block — without it, `goreleaser check` errors on a fresh repo
# ("scm releases: no remote configured to list refs from").
release:
  github: { owner: jjuanrivvera, name: tgctl }
  prerelease: auto

# Homebrew: use homebrew_casks (NOT the deprecated brews:). The cask is tgctl-cli,
# but the binary inside the archive is tgctl — so `binaries:` (plural list) is required,
# and an unsigned arm64 binary is SIGKILL'd by Gatekeeper without the xattr postflight.
homebrew_casks:
  - name: tgctl-cli
    binaries: [tgctl]
    repository: { owner: jjuanrivvera, name: homebrew-tgctl }
    homepage: https://github.com/jjuanrivvera/tgctl
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tgctl"]

scoops:
  - repository: { owner: jjuanrivvera, name: scoop-tgctl }   # this bucket repo must already exist

nfpms:
  - formats: [deb, rpm, apk]
    bindir: /usr/bin
    maintainer: jjuanrivvera
    contents:
      - { src: completions/tgctl.bash, dst: /usr/share/bash-completion/completions/tgctl }
      - { src: completions/tgctl.zsh,  dst: /usr/share/zsh/site-functions/_tgctl }
      - { src: completions/tgctl.fish, dst: /usr/share/fish/vendor_completions.d/tgctl.fish }

sboms:
  - artifacts: archive          # syft SBOMs

signs:                          # cosign keyless (needs CI OIDC: permissions id-token: write)
  - cmd: cosign
    artifacts: checksum
    output: true
    args: ["sign-blob", "--yes", "--output-signature=${signature}", "--output-certificate=${certificate}", "${artifact}"]

changelog:
  groups:
    - { title: Features, regexp: '^.*?feat(\(.+\))??!?:.+$', order: 0 }
    - { title: Fixes, regexp: '^.*?fix(\(.+\))??!?:.+$', order: 1 }
    - { title: Performance, regexp: '^.*?perf(\(.+\))??!?:.+$', order: 2 }
  filters:
    exclude: ['^docs:', '^test:', '^chore:', '^ci:', merge conflict, Merge pull request, Merge branch]
